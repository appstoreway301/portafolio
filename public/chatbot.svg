<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" width="640" height="360" role="img" aria-label="ChatBot IA">
  <defs>
    <linearGradient id="cbtBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#13131c"/>
      <stop offset="0.55" stop-color="#181a2e"/>
      <stop offset="1" stop-color="#23264d"/>
    </linearGradient>
    <linearGradient id="cbtBot" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8b8ef5"/>
      <stop offset="1" stop-color="#6366f1"/>
    </linearGradient>
    <radialGradient id="cbtGlow" cx="0.5" cy="0.45" r="0.6">
      <stop offset="0" stop-color="#6366f1" stop-opacity="0.32"/>
      <stop offset="1" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="640" height="360" fill="url(#cbtBg)"/>
  <rect width="640" height="360" fill="url(#cbtGlow)"/>

  <!-- decorative dots -->
  <g fill="#6366f1" opacity="0.16">
    <circle cx="80" cy="80" r="4"/>
    <circle cx="580" cy="70" r="5"/>
    <circle cx="600" cy="290" r="4"/>
    <circle cx="60" cy="280" r="4"/>
  </g>

  <!-- incoming chat bubble (left) -->
  <g>
    <rect x="92" y="96" rx="18" ry="18" width="150" height="56" fill="#262633"/>
    <path d="M 110 148 l -16 22 l 30 -10 z" fill="#262633"/>
    <circle cx="124" cy="124" r="6" fill="#9494a8"/>
    <circle cx="146" cy="124" r="6" fill="#9494a8"/>
    <circle cx="168" cy="124" r="6" fill="#9494a8"/>
  </g>

  <!-- bot reply bubble (right) -->
  <g>
    <rect x="392" y="208" rx="18" ry="18" width="158" height="56" fill="url(#cbtBot)"/>
    <path d="M 532 260 l 16 22 l -30 -10 z" fill="#6366f1"/>
    <rect x="410" y="222" width="118" height="9" rx="4.5" fill="#ffffff" opacity="0.92"/>
    <rect x="410" y="240" width="80" height="9" rx="4.5" fill="#ffffff" opacity="0.7"/>
  </g>

  <!-- robot head -->
  <g transform="translate(320 150)">
    <!-- antenna -->
    <line x1="0" y1="-58" x2="0" y2="-40" stroke="#8b8ef5" stroke-width="4"/>
    <circle cx="0" cy="-62" r="7" fill="#f0b429"/>
    <!-- head -->
    <rect x="-46" y="-40" rx="16" ry="16" width="92" height="78" fill="url(#cbtBot)"/>
    <!-- face screen -->
    <rect x="-34" y="-28" rx="10" ry="10" width="68" height="54" fill="#13131c"/>
    <!-- eyes -->
    <circle cx="-15" cy="-4" r="7" fill="#8b8ef5"/>
    <circle cx="15" cy="-4" r="7" fill="#8b8ef5"/>
    <!-- smile -->
    <path d="M -16 14 Q 0 26 16 14" fill="none" stroke="#8b8ef5" stroke-width="4" stroke-linecap="round"/>
    <!-- ears -->
    <rect x="-56" y="-14" width="10" height="26" rx="5" fill="#4f52e0"/>
    <rect x="46" y="-14" width="10" height="26" rx="5" fill="#4f52e0"/>
  </g>

  <!-- title -->
  <text x="320" y="300" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="700" fill="#ffffff" letter-spacing="0.5">ChatBot IA</text>
  <text x="320" y="328" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#9494a8">Asistente con IA local + visión</text>
</svg>
